name: CI

# On every push and PR, install the package locally and compile the sample
# theses (NUM + APA) to verify that the template still builds.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          typst-version: latest

      - name: Install the package locally (@local/community-itu-thesis:0.2.0)
        run: |
          DEST="$HOME/.local/share/typst/packages/local/community-itu-thesis/0.2.0"
          mkdir -p "$DEST"
          cp -r typst.toml lib.typ template README.md LICENSE "$DEST/"

      - name: Compile the samples (NUM + APA)
        run: |
          cp -r template /tmp/test
          sed -i 's#@preview/community-itu-thesis:0.2.0#@local/community-itu-thesis:0.2.0#g' \
            /tmp/test/main.typ /tmp/test/main-apa.typ
          typst compile /tmp/test/main.typ      /tmp/test/tez-num.pdf
          typst compile /tmp/test/main-apa.typ  /tmp/test/tez-apa.pdf

      - name: Archive the PDFs
        uses: actions/upload-artifact@v4
        with:
          name: sample-theses
          path: |
            /tmp/test/tez-num.pdf
            /tmp/test/tez-apa.pdf
